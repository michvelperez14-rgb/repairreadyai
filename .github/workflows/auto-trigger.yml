# --------------------------------------------------------------
# Auto‑Trigger Deploy workflow
# --------------------------------------------------------------
# Runs daily at 03:00 UTC (and can be triggered manually) to
# push a tiny `trigger.txt` file, which in turn fires the
# existing Deploy RepairReady AI workflow.
# --------------------------------------------------------------

name: Auto‑Trigger Deploy

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC each day
  workflow_dispatch:      # also allow manual runs

jobs:
  push_dummy_commit:          # <-- plain ASCII characters only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "Automation Bot"
          git config user.email "automation@repairready.ai"

      - name: Create dummy file (or update timestamp)
        run: |
          echo "trigger: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > trigger.txt
          git add trigger.txt
          git commit -m "🤖 Auto‑trigger: keep workflow alive"

      - name: Push commit using PAT
        env:
          PAT: ${{ secrets.AUTOMATION_PAT }}
        run: |
          git push https://${PAT}@github.com/michvelperez14-rgb/repairreadyai.git HEAD:main

